[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.93
unused-allowed-license = "allow"
private = { ignore = true }

[advisories]
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "Unmaintained compile-time paste macro is transitive through faer and Parquet; no safe upgrade exists. Monitor and remove when upstream graphs migrate." },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
